services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      PORT: 4000
      CORS_ORIGIN: "*"
    expose:
      - "4000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "8888:80"
    depends_on:
      - api
    restart: unless-stopped
